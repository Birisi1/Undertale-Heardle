<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Heardle</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --primary: #1db954;
            --border: #333333;
            --wrong: #e22134;
            --empty: #282828;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        #game-container {
            width: 100%;
            max-width: 480px;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        /* Header & Toggle */
        #header-bar {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 15px;
        }

        #mode-toggle {
            background-color: transparent;
            color: #aaaaaa;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #mode-toggle:hover {
            color: white;
            border-color: #666;
        }

        /* Top Bar: Play & Progress */
        #top-bar {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        #play-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 20px;
            cursor: pointer;
            flex-shrink: 0;
        }

        #progress-container {
            flex-grow: 1;
            height: 12px;
            background-color: var(--empty);
            position: relative;
            border-radius: 6px;
        }

        #progress-bar {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            border-radius: 6px;
            transition: width 0.1s linear;
        }

        .marker {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background-color: var(--bg-color);
        }

        /* Guesses Grid */
        #guesses-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .guess-box {
            border: 1px solid var(--border);
            height: 45px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 14px;
            background-color: var(--empty);
            border-radius: 4px;
        }

        /* Input Area */
        #input-container {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        #guess-input {
            flex-grow: 1;
            padding: 12px;
            background-color: var(--empty);
            border: 1px solid var(--border);
            color: white;
            border-radius: 4px;
            font-size: 16px;
        }

        #send-btn, #skip-btn {
            background-color: var(--border);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        #send-btn { background-color: var(--primary); }

        /* Autocomplete List */
        #autocomplete-list {
            position: absolute;
            bottom: 100%; 
            left: 0;
            right: 0;
            background-color: var(--empty);
            border: 1px solid var(--border);
            max-height: 200px;
            overflow-y: auto;
            margin: 0;
            padding: 0;
            list-style: none;
            z-index: 10;
            display: none;
            border-radius: 4px;
        }

        #autocomplete-list li {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }

        #autocomplete-list li:hover { background-color: var(--border); }

        /* Modals */
        .modal {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            text-align: center;
            padding: 20px;
        }

        .modal h2 { margin-bottom: 10px; }
        .modal button {
            margin: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            background: var(--primary);
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        .stats-text { font-size: 18px; margin: 5px 0; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="header-bar">
            <button id="mode-toggle">Search: First Word</button>
        </div>

        <div id="top-bar">
            <button id="play-btn">▶</button>
            <div id="progress-container">
                <div id="progress-bar"></div>
                <div id="markers"></div>
            </div>
        </div>

        <div id="guesses-grid">
            <div class="guess-box" id="guess-0"></div>
            <div class="guess-box" id="guess-1"></div>
            <div class="guess-box" id="guess-2"></div>
            <div class="guess-box" id="guess-3"></div>
            <div class="guess-box" id="guess-4"></div>
            <div class="guess-box" id="guess-5"></div>
        </div>

        <div id="input-container">
            <ul id="autocomplete-list"></ul>
            <div class="input-row">
                <input type="text" id="guess-input" placeholder="Guess a song..." autocomplete="off">
                <button id="send-btn">➤</button>
            </div>
            <button id="skip-btn">Skip</button>
        </div>

        <div id="end-modal" class="modal">
            <h2 id="end-title">You Won!</h2>
            <p id="end-song-name">Song Name</p>
            <div>
                <button id="next-btn">Next Song</button>
                <button id="exit-btn">Exit & Stats</button>
            </div>
        </div>

        <div id="stats-modal" class="modal">
            <h2>Your Statistics</h2>
            <p class="stats-text">Played: <span id="stat-played">0</span></p>
            <p class="stats-text">Won: <span id="stat-won">0</span></p>
            <p class="stats-text">Win %: <span id="stat-percent">0</span>%</p>
            <button onclick="location.reload()">Restart Game</button>
        </div>
    </div>

    { title: "Wrong Enemy ! ", file: "Toby Fox - Wrong Enemy !_.mp3" },
    { title: "You Idiot", file: "Toby Fox - You Idiot.mp3" },
    { title: "Your Best Friend", file: "Toby Fox - Your Best Friend.mp3" },
    { title: "Your Best Nightmare", file: "Toby Fox - Your Best Nightmare.mp3" }
];

        const guessDurations = [3, 6, 9, 14, 21, 30]; 
        const MAX_GUESSES = 6;
        const MAX_DURATION = guessDurations[guessDurations.length - 1]; 

        // --- GAME STATE ---
        let currentSongIndex = -1;
        let availableSongs = [...songLibrary];
        let currentGuess = 0;
        let isPlaying = false;
        let isGameOver = false;
        let searchMode = 'first'; // Can be 'first' or 'any'
        let audio = new Audio();
        let animationFrame;
        let stats = { played: 0, won: 0 };

        // DOM Elements
        const playBtn = document.getElementById('play-btn');
        const progressBar = document.getElementById('progress-bar');
        const markersContainer = document.getElementById('markers');
        const guessInput = document.getElementById('guess-input');
        const sendBtn = document.getElementById('send-btn');
        const skipBtn = document.getElementById('skip-btn');
        const autocompleteList = document.getElementById('autocomplete-list');
        const endModal = document.getElementById('end-modal');
        const statsModal = document.getElementById('stats-modal');
        const modeToggleBtn = document.getElementById('mode-toggle');

        function initGame() {
            if (availableSongs.length === 0) {
                alert("No more songs! Showing stats.");
                showStats();
                return;
            }

            const randIndex = Math.floor(Math.random() * availableSongs.length);
            const selectedSong = availableSongs[randIndex];
            audio.src = selectedSong.file;
            currentSongIndex = songLibrary.indexOf(selectedSong);
            
            availableSongs.splice(randIndex, 1);

            currentGuess = 0;
            isGameOver = false;
            guessInput.value = '';
            endModal.style.display = 'none';
            playBtn.innerText = '▶';
            progressBar.style.width = '0%';
            
            for(let i=0; i<MAX_GUESSES; i++) {
                const box = document.getElementById(`guess-${i}`);
                if (box) {
                    box.innerText = '';
                    box.style.borderColor = 'var(--border)';
                    box.style.color = 'var(--text-color)';
                }
            }
            
            drawMarkers();
        }

        // --- SEARCH TOGGLE LOGIC ---
        if (modeToggleBtn) {
            modeToggleBtn.addEventListener('click', () => {
                if (searchMode === 'first') {
                    searchMode = 'any';
                    modeToggleBtn.innerText = 'Search: Any Word';
                } else {
                    searchMode = 'first';
                    modeToggleBtn.innerText = 'Search: First Word';
                }
                updateAutocomplete(); 
            });
        }

        // Helper function to find matches based on the current mode
        function getMatches(query) {
            const searchStr = query.trim().toLowerCase();
            
            // FIXED: If the query is completely empty, return all songs!
            if (searchStr === "") return songLibrary;
            
            return songLibrary.filter(s => {
                const titleLower = s.title.toLowerCase();
                if (searchMode === 'first') {
                    return titleLower.startsWith(searchStr);
                } else {
                    return titleLower.startsWith(searchStr) || titleLower.includes(` ${searchStr}`);
                }
            });
        }

        // --- AUDIO LOGIC ---
        if (playBtn) playBtn.addEventListener('click', toggleAudio);

        function toggleAudio() {
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                playBtn.innerText = '▶';
                cancelAnimationFrame(animationFrame);
            } else {
                isPlaying = true; 
                audio.currentTime = 0; 
                audio.play().catch(e => {
                    isPlaying = false;
                    alert("Audio file not found! Check your filenames.");
                });
                
                if (isPlaying) {
                    playBtn.innerText = '⏸';
                    updateProgress(); 
                }
            }
        }

        audio.addEventListener('ended', () => {
            isPlaying = false;
            if (playBtn) playBtn.innerText = '▶';
            cancelAnimationFrame(animationFrame);
        });

        function updateProgress() {
            if (!isPlaying) return;
            
            const currentAllowedTime = isGameOver ? audio.duration : guessDurations[currentGuess];
            
            if (!isGameOver && audio.currentTime >= currentAllowedTime) {
                audio.pause();
                audio.currentTime = currentAllowedTime; 
                isPlaying = false;
                if (playBtn) playBtn.innerText = '▶';
                return; 
            }

            const width = (audio.currentTime / MAX_DURATION) * 100;
            if (progressBar) progressBar.style.width = `${Math.min(width, 100)}%`;

            animationFrame = requestAnimationFrame(updateProgress);
        }

        function drawMarkers() {
            if (!markersContainer) return;
            markersContainer.innerHTML = '';
            guessDurations.forEach(duration => {
                const marker = document.createElement('div');
                marker.className = 'marker';
                marker.style.left = `${(duration / MAX_DURATION) * 100}%`;
                markersContainer.appendChild(marker);
            });
        }

        // --- AUTOCOMPLETE & GUESSING ---
        if (guessInput) {
            guessInput.addEventListener('focus', updateAutocomplete);
            guessInput.addEventListener('input', updateAutocomplete);
        }

        function updateAutocomplete() {
            if(isGameOver || !autocompleteList) return;
            
            const matches = getMatches(guessInput.value);
            autocompleteList.innerHTML = '';
            
            if (matches.length > 0) {
                autocompleteList.style.display = 'block';
                matches.forEach(match => {
                    const li = document.createElement('li');
                    li.innerText = match.title;
                    li.onclick = () => {
                        guessInput.value = match.title;
                        autocompleteList.style.display = 'none';
                        submitGuess();
                    };
                    autocompleteList.appendChild(li);
                });
            } else {
                autocompleteList.style.display = 'none';
            }
        }

        document.addEventListener('click', (e) => {
            if(e.target !== guessInput && autocompleteList) autocompleteList.style.display = 'none';
        });

        if (sendBtn) sendBtn.addEventListener('click', submitGuess);
        if (skipBtn) skipBtn.addEventListener('click', () => submitGuess(true));
        
        if (guessInput) {
            guessInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const matches = getMatches(guessInput.value);
                    if (matches.length === 1 && guessInput.value.trim() !== '') {
                        guessInput.value = matches[0].title;
                    }
                    submitGuess();
                    if (autocompleteList) autocompleteList.style.display = 'none';
                }
            });
        }

        function submitGuess(isSkip = false) {
            if (isGameOver || currentGuess >= MAX_GUESSES) return;

            const userGuess = guessInput.value.trim();
            if (!isSkip && userGuess === "") return;

            const correctTitle = songLibrary[currentSongIndex].title;
            const box = document.getElementById(`guess-${currentGuess}`);
            
            if (box) {
                if (isSkip) {
                    box.innerText = "SKIPPED";
                    box.style.color = '#888';
                } else {
                    box.innerText = userGuess;
                    if (userGuess.toLowerCase() === correctTitle.toLowerCase()) {
                        box.style.borderColor = 'var(--primary)';
                        box.style.color = 'var(--primary)';
                        endGame(true);
                        return;
                    } else {
                        box.style.borderColor = 'var(--wrong)';
                        box.style.color = 'var(--wrong)';
                    }
                }
            }

            currentGuess++;
            guessInput.value = '';
            
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                cancelAnimationFrame(animationFrame);
            }
            if (playBtn) playBtn.innerText = '▶';
            if (progressBar) progressBar.style.width = '0%';

            if (currentGuess >= MAX_GUESSES) {
                endGame(false);
            }
        }

        function endGame(won) {
            isGameOver = true;
            stats.played++;
            if (won) stats.won++;

            audio.currentTime = 0;

            const title = document.getElementById('end-title');
            if (title) {
                title.innerText = won ? "You Got It!" : "Out of Guesses!";
                title.style.color = won ? "var(--primary)" : "var(--wrong)";
            }
            
            const songNameEl = document.getElementById('end-song-name');
            if (songNameEl) songNameEl.innerText = songLibrary[currentSongIndex].title;
            
            if (endModal) endModal.style.display = 'flex';
        }

        const nextBtn = document.getElementById('next-btn');
        const exitBtn = document.getElementById('exit-btn');
        if (nextBtn) nextBtn.addEventListener('click', initGame);
        if (exitBtn) exitBtn.addEventListener('click', showStats);

        function showStats() {
            if (endModal) endModal.style.display = 'none';
            
            const statPlayed = document.getElementById('stat-played');
            const statWon = document.getElementById('stat-won');
            const statPercent = document.getElementById('stat-percent');
            
            if (statPlayed) statPlayed.innerText = stats.played;
            if (statWon) statWon.innerText = stats.won;
            
            const percent = stats.played === 0 ? 0 : Math.round((stats.won / stats.played) * 100);
            if (statPercent) statPercent.innerText = percent;
            
            if (statsModal) statsModal.style.display = 'flex';
        }

        // Start the game!
        initGame();
    </script>
</body>
</html>
